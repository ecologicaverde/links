<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecológica Verde | Links</title>
    <link rel="icon" type="image/png" href="assets/logo/favicon.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-blur"></div>
    <div class="background-overlay"></div>
    <div class="particles" id="particles"></div>

    <main class="container">
        <div class="card">
            <div class="card-header">
                <div class="logo-container">
                    <div class="logo-ring"></div>
                    <img src="assets/logo/logo.png" alt="Ecológica Verde" class="logo">
                </div>
                <h1 class="brand-name">Ecológica Verde</h1>
                <p class="brand-tagline">Soluções sustentáveis para um futuro melhor</p>
                <div class="divider"></div>
            </div>

            <div class="links-container" id="linksContainer">
                <div class="loading-state">
                    <div class="loading-spinner"></div>
                    <p>Carregando links...</p>
                </div>
            </div>

            <div class="card-footer">
                <div class="social-proof">
                    <div class="followers-count">
                        <i class="fas fa-users"></i>
                        <span id="totalFollowers">0</span>
                        <span class="followers-label">seguidores</span>
                    </div>
                </div>
                <p class="copyright">&copy; 2024 Ecológica Verde</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
