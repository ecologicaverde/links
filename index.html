<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecológica Verde | Links</title>
    <link rel="icon" type="image/png" href="assets/logo/favicon.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="wallpaper-bg"></div>
    <div class="overlay-bg"></div>
    <div class="particles-container" id="particles"></div>

    <main class="page-wrapper">
        <div class="linktree-card">
            <div class="card-content">
                <div class="header">
                    <div class="avatar-frame">
                        <div class="avatar-glow"></div>
                        <img src="assets/logo/logo.png" alt="Ecológica Verde" class="avatar-img">
                    </div>
                    <h1 class="title">Ecológica Verde</h1>
                    <p class="subtitle">ᴅɪᴠᴜʟɢᴀɴᴅᴏ ᴄᴏɪsᴀs “ᴄᴏᴍᴘʀᴀᴅᴀs” ᴇᴄᴏʟᴏɢɪᴄᴀᴍᴇɴᴛᴇ.</p>
                </div>

                <div class="links-list" id="linksContainer">
                    <div class="placeholder-links">
                        <div class="placeholder-item"></div>
                        <div class="placeholder-item"></div>
                        <div class="placeholder-item"></div>
                        <div class="placeholder-item"></div>
                        <div class="placeholder-item"></div>
                        <div class="placeholder-item"></div>
                        <div class="placeholder-item"></div>
                    </div>
                </div>

                <div class="total-stats">
                    <div class="stats-inner">
                        <i class="fas fa-users"></i>
                        <span id="totalFollowers">0</span>
                        <span class="stats-text">Total de Seguidores</span>
                    </div>
                </div>

                <div class="footer-text">
                    <p class="copyright">&copy; 2024–2026 Ecológica Verde</p>
                    <p class="nonprofit">Projeto sem fins lucrativos</p>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
