<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecológica Verde | Links</title>
    <link rel="icon" type="image/png" href="assets/logo/favicon.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-wallpaper"></div>
    <div class="bg-overlay"></div>
    <div class="particles" id="particles"></div>

    <main class="main-container">
        <div class="modal-card">
            <div class="card-inner">
                <div class="profile-section">
                    <div class="avatar-wrapper">
                        <div class="avatar-border"></div>
                        <img src="assets/logo/logo.png" alt="Ecológica Verde" class="avatar">
                    </div>
                    <h1 class="profile-name">Ecológica Verde</h1>
                    <p class="profile-bio">Soluções sustentáveis para um futuro melhor</p>
                </div>

                <div class="links-section" id="linksContainer">
                    <div class="skeleton">
                        <div class="skeleton-item"></div>
                        <div class="skeleton-item"></div>
                        <div class="skeleton-item"></div>
                        <div class="skeleton-item"></div>
                    </div>
                </div>

                <div class="stats-section">
                    <div class="stat-item">
                        <i class="fas fa-users"></i>
                        <span id="totalFollowers">0</span>
                        <span class="stat-label">Total de Seguidores</span>
                    </div>
                </div>

                <footer class="footer-section">
                    <p>&copy; 2024 Ecológica Verde</p>
                </footer>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
