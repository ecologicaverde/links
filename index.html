<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecológica Verde | Links</title>
    <link rel="icon" type="image/png" href="assets/logo/favicon.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="wallpaper-bg"></div>
    <div class="overlay-bg"></div>
    <div class="particles-container" id="particles"></div>

    <main class="page-wrapper">
        <div class="linktree-card">
            <div class="card-content">
                <div class="header">
                    <div class="avatar-frame">
                        <div class="avatar-glow"></div>
                        <img src="assets/logo/logo.png" alt="Ecológica Verde" class="avatar-img">
                    </div>
                    <h1 class="title" id="siteTitle">Ecológica Verde</h1>
                    <p class="subtitle" id="siteSubtitle">ᴅɪᴠᴜʟɢᴀɴᴅᴏ ᴄᴏɪsᴀs “ᴄᴏᴍᴘʀᴀᴅᴀs” ᴇᴄᴏʟᴏɢɪᴄᴀᴍᴇɴᴛᴇ.</p>
                </div>

                <div class="links-list" id="linksContainer">
                    <div class="placeholder-links">
                        <div class="placeholder-item"></div>
                        <div class="placeholder-item"></div>
                        <div class="placeholder-item"></div>
                        <div class="placeholder-item"></div>
                        <div class="placeholder-item"></div>
                        <div class="placeholder-item"></div>
                        <div class="placeholder-item"></div>
                    </div>
                </div>

                <div class="total-stats">
                    <div class="stats-inner">
                        <i class="fas fa-users"></i>
                        <span id="totalFollowers">0</span>
                        <span class="stats-text" id="totalFollowersText">Total de Seguidores</span>
                    </div>
                </div>

                <div class="footer-text">
                    <p class="copyright">&copy; 2024–2026 Ecológica Verde</p>
                    <p class="nonprofit" id="nonprofitText">Projeto sem fins lucrativos</p>
                </div>
            </div>
        </div>

        <div class="controls-panel">
            <div class="language-selector">
                <button class="lang-btn" data-lang="pt">🇧🇷 PT</button>
                <button class="lang-btn" data-lang="en">🇺🇸 EN</button>
                <button class="lang-btn" data-lang="es">🇪🇸 ES</button>
                <button class="lang-btn" data-lang="ru">🇷🇺 RU</button>
            </div>

            <div class="music-controls">
                <div class="music-toggle-btn" id="musicToggle">
                    <div class="toggle-track">
                        <div class="toggle-thumb"></div>
                    </div>
                    <div class="toggle-content">
                        <i class="fas fa-volume-up toggle-icon"></i>
                        <span class="toggle-status">ON</span>
                    </div>
                </div>

                <div class="volume-control">
                    <i class="fas fa-volume-down"></i>
                    <input type="range" id="volumeSlider" min="0" max="100" value="70">
                    <i class="fas fa-volume-up"></i>
                </div>

                <div class="playlist-controls">
                    <button class="playlist-btn" id="prevBtn"><i class="fas fa-backward"></i></button>
                    <button class="playlist-btn" id="nextBtn"><i class="fas fa-forward"></i></button>
                </div>
            </div>

            <div class="share-controls">
                <button class="share-btn" id="copyLinkBtn"><i class="fas fa-link"></i> <span id="copyLinkText">Copiar Link</span></button>
                <button class="share-btn" id="whatsappBtn"><i class="fab fa-whatsapp"></i> <span id="whatsappText">WhatsApp</span></button>
                <button class="share-btn" id="qrCodeBtn"><i class="fas fa-qrcode"></i> <span id="qrCodeText">QR Code</span></button>
            </div>
        </div>
    </main>

    <div id="qrModal" class="qr-modal">
        <div class="qr-modal-content">
            <span class="qr-close">&times;</span>
            <h3 id="qrTitle">QR Code</h3>
            <div id="qrCodeContainer"></div>
            <p id="qrInstruction">Escaneie o QR Code para acessar esta página</p>
        </div>
    </div>

    <div id="toastMessage" class="toast-message"></div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
